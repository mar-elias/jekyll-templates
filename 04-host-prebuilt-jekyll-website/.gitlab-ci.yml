# Note: this setting does not cache well. Use another one instead.

pages:
  stage: deploy
  script:
    - echo "Doing something here (print) is necessary. In this case the print is necessary."
  artifacts:
    paths:
      - public # Deploy everything in current directory
  # Changes 20250323: This will make it build the website only when a new tag is pushed. Note that `rules:` does not work with `only:` so the latter is removed.
  #only:
  #- master
  rules:
  - if: $CI_COMMIT_TAG
  interruptible: true
