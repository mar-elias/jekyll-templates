# Note: this setting does not cache well. Use another one instead.

# Use the latest GitLab Pages image
image: node:lts

# Cache is not necessary for a small site
pages:
  stage: deploy
  script:
    - mkdir public
    - cp index.html public/
    - cp -r files public/
  artifacts:
    paths:
      - public
  # This will make it build the website only when a new tag is pushed. Note that `rules:` does not work with `only:` so the latter is removed.
  #only:
  #- master
  rules:
  - if: $CI_COMMIT_TAG
  interruptible: true
